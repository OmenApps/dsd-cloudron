daemon off;
worker_processes auto;
pid /run/nginx/nginx.pid;
error_log /dev/stdout info;
user cloudron;

events {
    worker_connections 768;
}

http {
    include /etc/nginx/mime.types;
    default_type application/octet-stream;
    sendfile on;
    tcp_nopush on;
    keepalive_timeout 65;
    types_hash_max_size 2048;

    client_body_temp_path /run/nginx/client_body;
    proxy_temp_path /run/nginx/proxy_temp;
    fastcgi_temp_path /run/nginx/fastcgi_temp;
    scgi_temp_path /run/nginx/scgi_temp;
    uwsgi_temp_path /run/nginx/uwsgi_temp;

    access_log /dev/stdout;
    error_log /dev/stdout info;
    gzip on;

    server {
        listen 8000;
        server_name _;
        client_max_body_size 100M;

        location /static/ {
            alias /run/blog/static/;
            expires 30d;
        }

        location /media/ {
            alias /app/data/media/;
        }

        location / {
            proxy_pass http://unix:/run/blog/gunicorn.sock;
            proxy_set_header Host $http_host;
            proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
            proxy_set_header X-Forwarded-Proto https;
        }
    }
}
