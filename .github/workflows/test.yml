name: tests
on:
  push:
    branches: [main]
  pull_request:
permissions:
  contents: read
concurrency:
  group: ${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true
jobs:
  lint:
    runs-on: ubuntu-latest
    timeout-minutes: 10
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: "3.12"
      - run: python -m pip install --upgrade pip
      - run: pip install -e ".[dev]"
      # black formatting is interpreter-independent, so check it once here rather
      # than on every test leg. target-version is pinned in pyproject.toml.
      - run: black --check .
  test:
    runs-on: ubuntu-latest
    timeout-minutes: 15
    strategy:
      fail-fast: false
      matrix:
        # Pin Django per interpreter so every version the classifiers advertise
        # (4.2, 5.2, 6.0) has a durable leg, rather than leaving Django to whatever
        # the resolver floats to. The 3.11 leg floats to cover the latest release
        # that still supports an older interpreter.
        include:
          - python-version: "3.9"
            django: "Django>=4.2,<4.3"
          - python-version: "3.10"
            django: "Django>=5.2,<5.3"
          - python-version: "3.11"
            django: ""
          - python-version: "3.12"
            django: "Django>=6.0,<6.1"
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: ${{ matrix.python-version }}
      - run: python -m pip install --upgrade pip
      - name: Install the plugin and the pinned Django
        env:
          # Quoted below so the shell does not read >=/< as redirection.
          DJANGO_SPEC: ${{ matrix.django }}
        run: |
          pip install -e ".[dev,bake]"
          if [ -n "$DJANGO_SPEC" ]; then pip install "$DJANGO_SPEC"; fi
      - run: python -m pytest -q
  build:
    runs-on: ubuntu-latest
    timeout-minutes: 25
    strategy:
      fail-fast: false
      matrix:
        include:
          - flavor: retrofit-lean
          - flavor: greenfield-full
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: "3.12"
      - run: python -m pip install --upgrade pip
      - name: Install the plugin
        run: pip install -e "."
      - name: Assemble the build context
        id: context
        run: |
          if [ "${{ matrix.flavor }}" = "retrofit-lean" ]; then
            CTX="$(mktemp -d)"
            python tests/build_tests/assemble_retrofit_sample.py "$CTX"
          else
            OUT="$(mktemp -d)"
            dsd-cloudron new "Smoke App" --celery --sso --output-dir "$OUT"
            CTX="$(find "$OUT" -mindepth 1 -maxdepth 1 -type d | head -n1)"
          fi
          echo "dir=$CTX" >> "$GITHUB_OUTPUT"
      - name: Build and boot
        run: bash tests/build_tests/boot_smoke.sh "${{ steps.context.outputs.dir }}" "${{ matrix.flavor }}"
  # Single aggregate check for the matrix. With fail-fast: false the two build
  # cells surface as separately named checks; this job collapses them into one
  # required status so a red cell blocks the branch even if protection rules were
  # never taught both cell names. Runs even when a cell fails (if: always).
  gate:
    runs-on: ubuntu-latest
    needs: [build]
    if: always()
    steps:
      - name: Require every build cell to pass
        env:
          BUILD_RESULT: ${{ needs.build.result }}
        run: |
          if [ "$BUILD_RESULT" != "success" ]; then
            echo "build did not succeed (result: $BUILD_RESULT)"
            exit 1
          fi
          echo "all build cells passed"
